    <!-- Fonts load as direct parallel-fetched links, not a CSS @import
         (an @import inside site.css would force the browser to fully fetch
         and parse site.css before it even discovers the font CSS exists —
         three serialized round-trips before text can render, instead of
         these starting immediately alongside everything else).

         The stylesheet link itself is also kept off the render-blocking
         path: media="print" makes the browser fetch it at normal priority
         without waiting for it before first paint, then the onload handler
         flips it to apply once it's actually ready. Text renders in the
         fallback system font immediately and swaps to the real font when
         it arrives (font-display=swap in the URL already does this same
         swap for the font files themselves) — a <noscript> fallback covers
         the rare case of JS being disabled. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700;800&family=Noto+Nastaliq+Urdu:wght@400;500;700&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700;800&family=Noto+Nastaliq+Urdu:wght@400;500;700&display=swap" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700;800&family=Noto+Nastaliq+Urdu:wght@400;500;700&display=swap" /></noscript>
