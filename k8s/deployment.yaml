apiVersion: apps/v1
kind: Deployment
metadata:
  name: speak-in-urdu
spec:
  replicas: 1
  selector:
    matchLabels:
      app: speak-in-urdu
  template:
    metadata:
      labels:
        app: speak-in-urdu
    spec:
      containers:
        - name: speak-in-urdu
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: site-content
              mountPath: /usr/share/nginx/html
      volumes:
        - name: site-content
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: speak-in-urdu
spec:
  selector:
    app: speak-in-urdu
  ports:
    - port: 80
      targetPort: 80
  type: LoadBalancer
